name: Compile CV

on:
  push:
    branches:
      - main

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra

      - name: Create CV - Swedish
        run: |
          for file in ./cv/swedish/industrier/*.tex; do
            sed -i "s|\\subfile{personal_letter/swedish/industrier}|\\subfile{personal_letter/swedish/industrier/$(basename "$file" .tex)}|g" "swedish.tex"
            pdflatex "swedish_$file.tex"
          done

      - name: Create CV - English
        run: |
          for file in ./cv/english/industries/*.tex; do
            sed -i "s|\\subfile{personal_letter/english/industries}|\\subfile{personal_letter/english/industries/$(basename "$file" .tex)}|g" "english.tex"
            pdflatex "english_$file.tex"
          done

      - name: Upload CV
        uses: actions/upload-artifact@v2
        with:
          name: CVs
          path: |
            english_*.pdf
            swedish_*.pdf
