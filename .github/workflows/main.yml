name: Compile CV

on:
  push:
    branches:
      - main

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra
          mkdir pdfs

      - name: Create CV - Swedish
        run: |
          for file in ./cv/swedish/industrier/*; do
            sed -i "s|\\subfile{personal_letter/swedish/industrier/test}|\\subfile{personal_letter/swedish/industrier/$(basename "$file" .tex)}|g" "swedish.tex"
            pdflatex -jobname=swedish_$(basename "$file" .tex) "swedish.tex"
          done

      - name: Create CV - English
        run: |
          for file in ./cv/english/industries/*; do
            sed -i "s|\\subfile{personal_letter/english/industries/test}|\\subfile{personal_letter/english/industries/$(basename "$file" .tex)}|g" "english.tex"
            pdflatex -jobname=english_$(basename "$file" .tex) "english.tex"
          done
      - name: cleanup
        run: |
          find . -type f ! -name "*.pdf" -delete

      - name: Upload CV
        uses: actions/upload-artifact@v2
        with:
          name: CVs
          path: |
            ./
